services:
  postgres:
    image: postgres:16-alpine
    container_name: perspectives-oa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: perspectives
      POSTGRES_PASSWORD: perspectives
      POSTGRES_DB: perspectives_oa
    ports:
      - "5432:5432"
    volumes:
      - perspectives-oa-pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U perspectives -d perspectives_oa"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  perspectives-oa-pg:
